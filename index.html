<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>You're Invited</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <video
    class="bg-video"
    src="assets/bg.mp4"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
    disablepictureinpicture
    disableremoteplayback
    aria-hidden="true"
  ></video>
  <div class="overlay" aria-hidden="true"></div>

  <audio
    id="bg-audio"
    src="assets/bg.mp3"
    loop
    muted
    autoplay
    playsinline
    preload="auto"
  ></audio>

  <button
    id="mute-btn"
    class="mute-btn"
    type="button"
    aria-label="Unmute music"
    aria-pressed="true"
  >
    <svg class="icon icon-muted" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 10v4h4l5 4V6L7 10H3z" fill="currentColor"/>
      <path d="M16 8l6 6M22 8l-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
    <svg class="icon icon-unmuted" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 10v4h4l5 4V6L7 10H3z" fill="currentColor"/>
      <path d="M16 8c1.5 1.2 1.5 6.8 0 8M19 5c3 2.4 3 11.6 0 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
  </button>

  <main class="content">
    <section class="details">
      <h1>You're Invited</h1>
      <p class="when">Friday, May 22 · 8:00 PM</p>
      <p class="where">123 Somewhere St, Tel Aviv</p>
      <p class="blurb">A small gathering. Dinner first, then we hang.</p>
      <p class="links">
        <a href="https://maps.google.com" target="_blank" rel="noopener">Map</a>
        <span aria-hidden="true">·</span>
        <a href="https://calendar.google.com" target="_blank" rel="noopener">Add to calendar</a>
      </p>
    </section>

    <form id="rsvp-form" class="rsvp" novalidate>
      <div class="name-row">
        <input
          id="name"
          name="name"
          type="text"
          autocomplete="name"
          required
          placeholder="Name"
          class="name-input"
        />

        <div class="counter" role="group" aria-label="Additional guests">
          <button type="button" class="counter-btn" id="plus-minus" aria-label="Decrease">−</button>
          <span class="counter-value" id="plus-value" aria-live="polite">0</span>
          <button type="button" class="counter-btn" id="plus-plus" aria-label="Increase">+</button>
        </div>
      </div>

      <fieldset class="checks">
        <legend>I'm in for</legend>
        <label class="check">
          <input type="checkbox" id="dinner" name="dinner" />
          <span>Dinner</span>
        </label>
        <label class="check">
          <input type="checkbox" id="hang" name="hang" />
          <span>Hang</span>
        </label>
      </fieldset>

      <button type="submit" id="submit-btn">RSVP</button>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
